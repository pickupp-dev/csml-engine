name: linux-build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm]
        include:
          - os: ubuntu-22.04
            asset_name: csml-server-linux-amd64
            cli_asset_name: csml-cli-linux-amd64
          - os: ubuntu-22.04-arm
            asset_name: csml-server-linux-arm64
            cli_asset_name: csml-cli-linux-arm64

    steps:
      - uses: actions/checkout@v2

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-csml-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install postgres (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev postgresql
          echo "host    all             all             127.0.0.1/32            md5" > sudo tee -a /etc/postgresql/10/main/pg_hba.conf
          sudo service postgresql restart && sleep 3
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo service postgresql restart && sleep 3

      - name: Install Rust Stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build Server
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --manifest-path=csml_server/Cargo.toml --features csml_engine/postgresql --release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/csml_server

      - name: Build CLI
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --manifest-path=csml_cli/Cargo.toml --features csml_engine/postgresql --release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli_asset_name }}
          path: target/release/csml

  publish-binaries:
    runs-on: ubuntu-22.04
    needs: [build]
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - run: mkdir -p target/release
      - uses: actions/download-artifact@v4
        with:
          name: csml-server-linux-${{ matrix.arch }}
          path: target/release

      - name: Upload linux binary to release
        uses: svenstaro/upload-release-action@2.2.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/release/csml_server
          asset_name: csml-server-linux-${{ matrix.arch }}
          tag: ${{ github.ref }}
          overwrite: true

      - uses: actions/download-artifact@v4
        with:
          name: csml-cli-linux-${{ matrix.arch }}
          path: target/release

      - name: Upload linux CLI binary to release
        uses: svenstaro/upload-release-action@2.2.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/release/csml
          asset_name: csml-cli-linux-${{ matrix.arch }}
          tag: ${{ github.ref }}
          overwrite: true

  publish-docker:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v2

      - uses: actions/download-artifact@v4
        with:
          name: csml-server-linux-amd64
          path: target/amd64/release

      - uses: actions/download-artifact@v4
        with:
          name: csml-server-linux-arm64
          path: target/arm64/release

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # using ${{ github.ref }} returns /refs/tags/TAGNAME instead of just TAGNAME
      - name: Get release version
        id: release_version
        run: echo ::set-output name=tag::${GITHUB_REF#refs/*/}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/csml-engine:latest
            ghcr.io/${{ github.repository_owner }}/csml-engine:${{ steps.release_version.outputs.tag }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
